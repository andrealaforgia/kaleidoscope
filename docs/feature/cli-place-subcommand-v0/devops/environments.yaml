# Environments - cli-place-subcommand-v0
# Apex (nw-platform-architect), DEVOPS wave, 2026-05-19.
#
# Adds the `place` positional subcommand to kaleidoscope-cli; one
# direct Cinder placement per invocation via TieringStore::place
# (overwrite-semantics, () return) with optional --observe-otlp
# sidecar emitting exactly one cinder.place.count OTLP-JSON line
# per call. Deployment target is the developer workstation and the
# CI runner. No service, no cluster, no cloud. ELEVENTH consecutive
# zero-workflow-edit wave on the kaleidoscope-cli package.

environments:
  workstation:
    purpose: Local development and pre-push validation.
    runtime: Stable Rust per rust-toolchain.toml (no toolchain pin change).
    build: cargo test --workspace --all-targets --locked
    secrets: none
    network: none

  ci:
    purpose: GitHub Actions runner; five-gate workspace contract.
    runtime: Same stable Rust; ubuntu-latest images.
    triggers: push to main (trunk-based; no required-status-checks).
    secrets: none
    workflow: .github/workflows/ci.yml (UNMODIFIED this wave).
    gates_inherited:
      - gate-1-test-workspace            # picks up new [[test]] block (A2)
      - gate-2-fmt-and-clippy
      - gate-3-build-release
      - gate-4-deny-audit                # no-op: zero new deps (A3)
      - gate-5-mutants-kaleidoscope-cli  # --in-diff auto-covers (A1)

  production:
    purpose: N/A. CLI binary; no service deployment target.
    notes: |
      Operator runs the binary on their own host. `place` mutates
      the Cinder WAL+snapshot under <data_dir>/cinder.* via one
      TieringStore::place call; emits one stdout line
      `placed tenant=<t> item=<id> tier=<x>\n`; when
      `--observe-otlp <path>` is set, appends exactly ONE
      `cinder.place.count` OTLP-JSON line per call via the
      already-shipped CinderToOtlpJsonWriter. The Lumen store is
      NEVER opened (D-NoLumenTouch byte-equivalence). Operator's
      existing sidecar pipeline (OTLP-JSON tail -> OTLP/HTTP
      collector -> dashboard) is byte-identical for the
      cinder.place.count line that ingest already emits.
