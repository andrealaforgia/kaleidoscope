# Environment inventory - pulse-series-identity-v0
#
# Library-only, in-crate data-model correction. This feature does NOT
# install into any deployed system. It re-keys Pulse's series index from
# (tenant, MetricName) to (tenant, SeriesKey) - the full label set - and
# rebuilds snapshot buckets accordingly, all within the existing `pulse`
# crate's three files: store.rs, file_backed.rs, metric.rs. There is no
# new component, no new crate, no new public API, and no deployment
# artefact.
#
# Per the platform-architect skill's library-only rule, the only target
# environment that warrants enumeration is `clean`: a fresh Cargo
# workspace over the durable substrate, on the platforms where the
# workspace compiles. This file is consumed by DISTILL for Mandate 4
# (Environmental Realism). The acceptance scenarios (a new
# crates/pulse/tests/ file) ARE parametrised over the durable substrate -
# a real FileBackedMetricStore in a tempdir, exercised through snapshot
# and WAL-only recovery - because durable survival of distinct series is
# part of the contract (US-02). They are NOT parametrised over external
# services, of which there are none.
#
# Author: Apex (nw-platform-architect), DEVOPS wave.
# Date:   2026-05-22
# Source of truth for the DESIGN -> DEVOPS -> DISTILL -> DELIVER handoff.

target_environments:
  - name: clean
    description: >-
      Fresh Cargo workspace, no prior state, no external services. The
      acceptance tests open a real pulse::FileBackedMetricStore in a
      per-test tempdir, ingest two same-named metrics differing by
      resource_attributes (for example service.name = checkout versus
      cart) under one tenant, query the name and assert two distinct
      correctly-labelled series, then drop and reopen to validate
      survival through both recovery paths: snapshot-plus-replay and
      WAL-only replay. All filesystem writes stay inside the per-test
      tempdir. No network, no subprocess, no daemon.
    substrate:
      kind: durable-local-filesystem
      adapter: pulse::FileBackedMetricStore
      artefacts:
        - "<base>.wal (NDJSON write-ahead log)"
        - "<base>.snapshot (JSON snapshot, buckets keyed by full label set)"
      recovery_modes_exercised:
        - "snapshot + WAL replay (reopen after a snapshot has been written)"
        - "WAL-only replay (reopen with no snapshot, append-and-sort)"
      note: >-
        The on-disk snapshot format may change freely (DESIGN D7,
        ADR-0045 Decision 4). There is no production Pulse data
        (library-only at v0/v1, no daemon), so no migration, shim, or
        version negotiation is required.
    platform: [linux, macos]
    preconditions:
      - "Rust toolchain installed (stable, pinned via rust-toolchain.toml)"
      - "Cargo workspace builds green at HEAD (cargo build --workspace --locked)"

# The change MUST NOT break any workspace tool that ADR-0005's five-gate
# CI contract relies on, nor any pre-commit/pre-push hook, nor any
# sibling crate's build. It is a keying correction in three existing
# files of one existing crate, so every entry below is must_not_break:
# true. Each note records what was VERIFIED against .github/workflows/ci.yml
# in this wave (not assumed from the DESIGN handoff).
coexistence_matrix:
  - tool: cargo
    must_not_break: true
    notes: >-
      Stable Rust per rust-toolchain.toml. No proc-macros, no build
      scripts, no platform-conditional code. SeriesKey uses only
      std::collections::BTreeMap and derive macros (Hash/Eq/PartialEq/
      Ord/PartialOrd/Clone/Debug per ADR-0045 Decision 1).
  - tool: cargo-public-api
    must_not_break: true
    notes: >-
      ADR-0005 Gate 2. VERIFIED in ci.yml (lines 326-347): scopes to
      otlp-conformance-harness, spark, sieve, codex only. Pulse is NOT
      in Gate 2's locked set, so no public-api diff applies to this
      feature. Independently, the MetricStore trait signature is
      unchanged (DESIGN D8, ADR-0045 Decision 5), and SeriesKey is to be
      kept crate-private (pub(crate)) at DELIVER, so no public surface is
      added even were pulse to graduate to Gate 2 later.
  - tool: cargo-semver-checks
    must_not_break: true
    notes: >-
      ADR-0005 Gate 3. VERIFIED in ci.yml (lines 420-433): same scope as
      Gate 2 (harness, spark, sieve, codex); pulse not included. The
      trait signature is unchanged regardless.
  - tool: cargo-deny
    must_not_break: true
    notes: >-
      ADR-0005 Gate 4. Workspace-wide. ZERO new external dependencies;
      no deny.toml change required (serde, serde_json, aegis already
      present; SeriesKey adds only std + derive macros).
  - tool: cargo-mutants
    must_not_break: true
    notes: >-
      ADR-0005 Gate 5. Per-feature, 100% kill rate per CLAUDE.md and
      ADR-0005 Gate 5. VERIFIED in ci.yml: gate-5-mutants-pulse ALREADY
      EXISTS (line 1123) and runs `cargo mutants --package pulse
      --in-diff "$DIFF_FILE"` against crates/pulse/** with the
      origin/main -> HEAD~1 -> full baseline cascade, short-circuiting to
      a zero-second exit on an empty diff. It therefore picks up the
      mutations in store.rs, file_backed.rs, and metric.rs automatically.
      No workflow edit, no new job.
  - tool: pre-commit hook (scripts/hooks/pre-commit)
    must_not_break: true
    notes: >-
      Mirrors the CI commit stage. cargo test --workspace --all-targets
      --locked picks up the new pulse series-identity test file
      naturally via its inclusion under crates/pulse/tests/. No hook edit
      required.
  - tool: pre-push hook (scripts/hooks/pre-push)
    must_not_break: true
    notes: >-
      Runs the nightly-bound gates (2 and 3) locally for their scoped
      packages. Pulse is not in that per-package loop. No hook edit
      required.

# Pure Rust, no platform-specific code. The crate's existing recovery
# durability tests are the empirical probe and are unchanged in shape
# (they now also exercise distinct-series survival per the DESIGN
# Earned Trust note).
platform_coverage:
  macOS: [13.x, 14.x, 15.x]
  Linux: [Ubuntu 22.04, Ubuntu 24.04]
  CI: [GitHub Actions ubuntu-latest]

# Library-only. NO deployment target: no binary, container, Helm chart,
# or systemd unit. The snapshot on-disk format changes, but there is no
# production Pulse data, so no migration, shim, or version negotiation is
# needed.
deployment_assumptions:
  - "Cargo workspace build remains green after the re-keying lands"
  - "Existing crates MUST NOT regress (the MetricStore trait signature is unchanged; verified D8)"
  - "Pre-commit and pre-push hooks succeed on the augmented workspace without modification"
  - "The snapshot format may change freely; no migration because no production data exists"
  - "No external service, container, or network dependency introduced"
  - "The feature inherits ADR-0005's five-gate workspace CI contract unchanged; no new gate, no contract amendment"

# Outcome KPIs (see ../discuss/outcome-kpis.md) are correctness
# indicators measured by green acceptance tests at DELIVER close, all
# CI-gated via Gate 1 (cargo test --workspace) running the new pulse
# series-identity test file to GREEN. See wave-decisions.md "KPI to gate
# mapping" for the full per-KPI table.
kpi_collection:
  - kpi: "North star - per-service provenance survives ingest and recovery"
    collection: "Gate 1 - cargo test --workspace on the new pulse series-identity test (US-01 live path + US-02 durable paths)"
  - kpi: "Distinct series preserved at ingest (100% of distinct label sets under a name)"
    collection: "Gate 1 - US-01 acceptance scenarios"
  - kpi: "No cross-service label overwrite (0 overwrites)"
    collection: "Gate 1 - US-01 assertion that neither service's resource_attributes overwrites the other's"
  - kpi: "Identical label set merges, not duplicates (1 series, points ascending)"
    collection: "Gate 1 - US-01 boundary scenario"
  - kpi: "Distinct series survive snapshot + reopen (100% present, correctly labelled)"
    collection: "Gate 1 - US-02 snapshot-path scenario against a real FileBackedMetricStore in a tempdir"
  - kpi: "Distinct series survive WAL-only reopen (100% present, correctly labelled)"
    collection: "Gate 1 - US-02 WAL-replay scenario"
  - kpi: "MetricStore trait signature unchanged (0 signature changes)"
    collection: "Compile of all existing pulse consumers (query-api, aperture-storage-sink, self-observe) under Gate 1"
  - kpi: "Point attributes untouched (per-point, unchanged)"
    collection: "Gate 1 - US-01 edge scenario (point attrs do not split a series)"
