# Environments inventory - query-range-api-v0 (DEVOPS)
#
# Author: Apex (nw-platform-architect). Date: 2026-05-21.
# Branching: pure trunk-based (no required-status-checks, admins not
# enforced) per memory project_kaleidoscope_pure_trunk_based.
#
# Two halves, same split as aperture-storage-sink-v0:
#   1. Kaleidoscope-side: the workspace + GitHub Actions CI where the
#      five ADR-0005 gates must pass on every commit. This is the only
#      side this wave delivers configuration for.
#   2. Operator-side: the long-lived query-api process the operator runs
#      against their own pillar_root. Operator-owned and out of scope,
#      but recorded because query-api is a NEW runnable deployable - the
#      THIRD HTTP deployable after kaleidoscope-cli and the gateway.

schema_version: 1
generated_at_utc: "2026-05-21"
applies_to_feature: query-range-api-v0

environments:

  # Kaleidoscope-side: the CI gate (authoritative verdict).
  - id: ci-github-actions
    name: GitHub Actions runner (ubuntu-latest)
    kind: ci-runner
    inherits_from: docs/feature/aperture-storage-sink-v0/devops/environments.yaml#ci-github-actions
    purpose: |
      The authoritative gate. The five ADR-0005 gates run here on every
      push to main and pull_request to main. The NEW
      gate-5-mutants-query-api job (A1) runs here too, in parallel with
      the existing Gate 5 jobs. KPI-3's p95 query latency <= 500 ms
      budget is asserted on this runner class (ubuntu-latest), not on a
      fast workstation (CI-realism, per outcome-kpis.md).
    operating_system: Ubuntu (ubuntu-latest)
    architecture: x86_64
    rust_toolchain: stable (rust-toolchain.toml); no new pin (A4)
    required_tools:
      - cargo + rustc (stable; bundled toolchain)
      - cargo-mutants (already installed for the existing Gate 5 jobs)
    new_tools_required: NONE. cargo-mutants is already present.
    network_required: First-build only (cargo fetches from crates.io).
    persistent_state: None. Each job runs in a fresh ephemeral runner.
    secrets: None. permissions: read; no GitHub secrets consumed.

  # Operator-side: the NEW deployable. Operator-owned, out of scope,
  # recorded because query-range-api-v0 ships a runnable binary.
  - id: operator-query-api-runtime
    name: query-api process (operator-run) [OUT OF SCOPE]
    kind: operator-runtime
    status: |
      Operator-owned, out of scope for this wave, same posture as the
      gateway's operator-side runtime. Documented as the operational
      shape of the new deployable, not as something Kaleidoscope hosts.
    purpose: |
      A new runnable composition binary (the thin [[bin]] in the
      query-api crate), the THIRD HTTP deployable on the platform after
      kaleidoscope-cli and kaleidoscope-gateway. It opens the durable
      Pulse store READ-ONLY at a configured pillar root, runs the
      Earned-Trust startup probe (DD9; refuses with
      event=health.startup.refused on an unreadable store or unresolved
      tenant), binds an axum listener, and serves
      GET /api/v1/query_range as a Prometheus matrix until SIGTERM.
    read_only: |
      query-api is READ-ONLY. It calls pulse MetricStore::query and
      NEVER ingest. It does not write to the Pulse store. The write half
      is the gateway. v0 assumes single-writer: query-api is not run
      against a live-writer directory concurrently (DD8); concurrent
      reader-against-live-writer is a v1 concern.
    operational_shape:
      config:
        - pillar_root: filesystem path; query-api opens the Pulse store
          at KALEIDOSCOPE_PILLAR_ROOT/pulse (read path, DD8)
        - KALEIDOSCOPE_QUERY_TENANT: required string; tenant resolution
          is fail-closed - unset or empty refuses every request (DD7)
        - listen address/port: the axum bind address for /api/v1/*
          (operator-configured; same axum::serve shape as aperture)
      persistent_state: |
        None of its own. query-api holds an open read handle on the
        operator's Pulse directory (written by the gateway). It creates
        no on-disk state; restart re-opens the same store read-only.
      secrets: None at v0 (plaintext; same posture as the gateway).
    dockerfile_option: |
      A Dockerfile for query-api is a POSSIBLE follow-up (the project
      already has a multi-stage Dockerfile for kaleidoscope-cli and
      Dockerfile.gateway for the gateway). NOT forced now; recorded as a
      future option once an operator needs a container image.

invariants:
  - No new external crate enters the workspace graph (A3): query-api
    uses pulse + aegis (in-tree), axum + hyper + tokio (already present
    via aperture), and serde_json (already a workspace dep). Gate 4
    (cargo deny) sees no new crate.
  - No new toolchain pin (A4): stable, identical to every Gate 5 job.
  - No environment promotion (dev -> staging -> prod) on the
    Kaleidoscope side. The contract is "the gates pass on CI, on every
    commit". The query-api runtime is operator-owned.

out_of_scope:
  - Operator orchestration (k8s, systemd, bare-metal) for query-api:
    operator-supplied, same posture as the gateway's runtime.
  - A Dockerfile / OCI image for query-api: possible follow-up, not
    delivered now.
  - macos-latest / windows CI arms: ubuntu-latest only, per the platform.
  - The reverse proxy that serves Prism's bundle at / and forwards
    /api/v1/* (same-origin posture, ADR-0027 5): operator-owned.
