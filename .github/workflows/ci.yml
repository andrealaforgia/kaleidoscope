  # =====================================================================
  # Prism v0 gates 6-11 — TS/React side per docs/feature/prism-v0/devops
  #
  # Gates 6 (Vitest), 7 (Playwright), 8 (bundle size), 9 (lint + format
  # + AGPL licence-header), 10 (StrykerJS mutation, in-diff cascade),
  # 11 (Prometheus contract test, container fixture).
  #
  # All six gates run only when apps/prism/ files change, gated by the
  # path filter on `on.push.paths` + per-job conditional. Rust-only
  # commits skip the TS gates entirely.
  # =====================================================================

  gate-6-prism-vitest:
    name: Gate 6 — Prism Vitest (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: pnpm install --frozen-lockfile
        run: pnpm install --frozen-lockfile
      - name: pnpm --filter prism typecheck
        run: pnpm --filter prism typecheck
      - name: pnpm --filter prism vitest run
        run: pnpm --filter prism exec vitest run --reporter=verbose

  gate-9-prism-lint-format:
    name: Gate 9 — Prism lint + format + AGPL licence-header
    runs-on: ubuntu-latest
    timeout-minutes: 5
