        uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090 # v2.76.0
        with:
          tool: cargo-mutants

      - name: cargo mutants (spark, in-diff)
        # Same `--in-diff` strategy as the aperture job: mutate only
        # files changed by the commit relative to a baseline. Baseline
        # cascade matches aperture (origin/main → HEAD~1 → full).
        # An empty diff (commit does not touch crates/spark/) short-
        # circuits to a zero-second exit.
