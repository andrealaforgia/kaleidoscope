# Kaleidoscope CI — runs the five ADR-0005 gates on every push to `main`
# and every pull request.
#
# Workspace coverage:
#   - `crates/otlp-conformance-harness/`: a pure-function library.
#   - `crates/aperture/`: a service (long-lived OTLP gateway, two
#     listener ports). Graduated to full coverage on 2026-05-05 at the
#     close of the Aperture v0 DELIVER cycle (8 slices green, peer
#     review APPROVED). Gate 1 now runs `cargo test --workspace`,
#     Gate 5 runs `cargo mutants --package otlp-conformance-harness
#     --package aperture`, and the local pre-commit hook covers both.
#     Three Aperture-specific gates (`gate-6-aperture-architectural-rules`,
#     `gate-7-aperture-no-telemetry`, `gate-8-aperture-probe-gold`) are
#     wired by their respective DELIVER slices, NOT by this DEVOPS
#     wave (per `docs/feature/aperture/devops/ci-cd-pipeline.md > Three
#     new Aperture-specific gates`).
#
# Library-not-service-only framing (deprecated): this workflow used to
# test ONLY a Cargo library; Aperture changes that. The harness has no
# deployment target and emits no telemetry of its own; Aperture is a
# service with two listeners and structured stderr output, but
# Kaleidoscope itself still does not deploy Aperture (operators do).
# So the no-deployment, no-runtime-telemetry framing remains correct
# from this workflow's perspective even though Aperture is a service.
#
# Gate ordering is descending speed (fail-fast), per ADR-0005:
#   Gate 4 (cargo deny)         — milliseconds
#   Gate 1 (cargo test)         — seconds
#   Gate 2 (cargo public-api)   — seconds, requires nightly
#   Gate 3 (cargo semver-checks) — seconds, requires nightly
#   Gate 5 (cargo mutants)      — minutes
#
# Toolchain matrix: stable Rust 1.85 (project MSRV) by default, pinned
# via `rust-toolchain.toml`. Gates 2 and 3 install $NIGHTLY_PIN and
# override the workspace pin for their own jobs (their tooling needs
# rustc newer than our MSRV).
#
# Caching: `~/.cargo/registry`, `~/.cargo/git`, and `target/` are cached
# per-OS and per-`Cargo.lock` hash to keep CI fast.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Trunk-Based Development: every push to main triggers the full
# pipeline; every PR runs the same gates before merge. There are no
# long-lived feature branches.

# Cancel superseded runs on the same branch / PR to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default permissions are read-only. Specific jobs can opt in to writes.
permissions:
  contents: read

env:
  # Cargo and rustc behaviour.
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0          # CI does not benefit from incremental builds
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short
  # Pin the nightly toolchain date used for Gates 2 and 3 to keep
  # `cargo public-api` diffs reproducible and to insulate against
  # nightly compiler regressions. Bump deliberately when Gate 2 or
  # Gate 3 produces unexpected noise.
  NIGHTLY_PIN: nightly-2026-04-15

jobs:
  # =====================================================================
  # Gate 4 — `cargo deny check`
  # ADR-0005 ordering: fastest gate first; fail-fast on licence / pin /
  # advisory issues before spinning up the full Rust toolchain build
  # cache.
  # =====================================================================
  gate-4-deny:
    name: Gate 4 — cargo deny check
    runs-on: ubuntu-latest
    env:
      # Gate 4 walks the dependency graph (cargo metadata). It does not
      # compile our code, so the project's MSRV pin (1.78, set in
      # rust-toolchain.toml) is not required here. RUSTUP_TOOLCHAIN
      # overrides rustup's project-pin discovery for this job only,
      # ensuring cargo can parse modern manifests that may appear in
      # transitive deps under feature-gated platform branches.
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-deny (precompiled binary)
        # Direct binary install on the runner replaces the previous
        # docker-based action. The docker container honoured our
        # rust-toolchain.toml pin (1.78) for cargo metadata, which broke
        # against transitive deps requiring edition2024 (e.g. the
        # wasip3 -> wit-bindgen-core tail). Running cargo-deny natively
        # under RUSTUP_TOOLCHAIN=stable sidesteps that, and deny.toml's
        # [graph].targets restricts the dep walk to platforms we ship
        # for so the wasm tail is no longer materialised at all.
        uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090 # v2.76.0
        with:
          tool: cargo-deny

      - name: Run cargo-deny (advisories, bans, licenses, sources)
        # All four built-in checks. `bans` catches the ADR-0003 pin
        # violation (opentelemetry-proto must be `=`-pinned).
        run: cargo deny --all-features check

  # =====================================================================
  # Gate 1 — `cargo test --all-targets --locked`
  # The corpus runner (slice 07) is part of this gate. KPI 4's verdict
  # counts artefact is produced by a small wrapper script that parses
  # the test runner's structured output.
  #
  # APERTURE GRADUATION: today this gate is scoped to `-p
  # otlp-conformance-harness` because Aperture's tests are RED at
  # DISTILL completion (every test panics with `unimplemented!()`
  # until DELIVER lands the corresponding slice; per
  # `docs/feature/aperture/distill/wave-decisions.md > D7`).
  #
  # When the Aperture DELIVER cycle closes (all 8 slices green plus
  # the 2 invariant tests wired by Slices 03 and 06), DELIVER's
  # final commit replaces the `-p otlp-conformance-harness`
  # invocation below with `--workspace --all-targets --locked` (and
  # makes the symmetric edit to `scripts/hooks/pre-commit` that
  # removes `--exclude aperture` from the local hook). See
  # `docs/feature/aperture/devops/wave-decisions.md > A2`.
  # =====================================================================
  gate-1-test:
    name: Gate 1 — cargo test (all targets, locked)
    runs-on: ubuntu-latest
    needs: gate-4-deny
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust toolchain (pinned via rust-toolchain.toml)
        # The action installs the latest stable channel; rustup then
        # honours rust-toolchain.toml (1.85) when cargo runs in the
        # workspace. The v1 SHA requires the `toolchain:` input
        # explicitly — the floating `@stable` tag used to bake it in.
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1 (was @stable)
        with:
          toolchain: stable

      - name: Cache Cargo registry, git index and target/
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-

      - name: cargo test --all-targets --locked
        # The harness's full Gate 1 invocation per ADR-0005 (Gate 1 of
        # the five-gate CI contract).
        # `--all-targets` is required, not optional: it runs unit
        # tests, integration tests (every `tests/slice_*.rs`), the
        # corpus runner (`tests/slice_07_lock_the_contract.rs`), the
        # `examples/capture_corpus_vectors.rs` build, and doc tests
        # in one invocation. Removing `--all-targets` for speed would
        # silently drop the integration suite — which is the entire
        # acceptance surface of the harness.
        # `--locked` enforces the ADR-0003 pin at CI level (refuses
        # to update Cargo.lock; CI must use exactly the committed
        # dependency versions).
        #
        # `--workspace` covers both the harness and aperture (graduated
        # at the close of the Aperture v0 DELIVER cycle on 2026-05-05;
        # Slices 01-08 all green, peer-reviewed APPROVED).
        run: cargo test --workspace --all-targets --locked

      # KPI 4 verdict-counts artefact (Crafty's Q5).
      #
      # The corpus runner asserts per-vector verdicts via panics; it
      # does not by itself emit a JSON tally. This step re-runs the
      # corpus tests with `--format json -Z unstable-options` *only* if
      # nightly is available; otherwise it derives counts from the
      # vectors directory and the harness's `Rule` enumeration. The
      # latter is sufficient for KPI 4 because the slice 07 runner
      # already gates on every-vector-passes; the artefact merely
      # surfaces the per-signal, per-rule counts for KPI 4 reporting.
      - name: Capture KPI 4 verdict-counts artefact
        if: success() || failure()
        run: |
          mkdir -p target/kpi
          python3 - <<'PY'
          import json, os, pathlib, datetime
          root = pathlib.Path("crates/otlp-conformance-harness/tests/vectors")
          counts = {
              "schema_version": 1,
              "generated_at_utc": datetime.datetime.utcnow().isoformat(timespec="seconds") + "Z",
              "commit_sha": os.environ.get("GITHUB_SHA", ""),
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "per_signal": {},
              "per_rule": {},
              "totals": {"accept": 0, "reject": 0},
          }
          for signal_dir in sorted(p for p in root.iterdir() if p.is_dir()):
              signal = signal_dir.name
              accept = sorted((signal_dir / "accept").glob("*.bin")) if (signal_dir / "accept").is_dir() else []
              reject = sorted((signal_dir / "reject").glob("*.bin")) if (signal_dir / "reject").is_dir() else []
              counts["per_signal"][signal] = {
                  "accept": len(accept),
                  "reject": len(reject),
              }
              counts["totals"]["accept"] += len(accept)
              counts["totals"]["reject"] += len(reject)
              for descriptor in sorted((signal_dir / "reject").glob("*.expected.json")) if (signal_dir / "reject").is_dir() else []:
                  data = json.loads(descriptor.read_text())
                  rule = data.get("rule", "<unknown>")
                  bucket = counts["per_rule"].setdefault(rule, {"reject_vectors": 0, "signals": {}})
                  bucket["reject_vectors"] += 1
                  bucket["signals"][signal] = bucket["signals"].get(signal, 0) + 1
          out = pathlib.Path("target/kpi/verdict-counts.json")
          out.write_text(json.dumps(counts, indent=2, sort_keys=True) + "\n")
          print(out.read_text())
          PY

      - name: Upload KPI 4 verdict-counts artefact
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verdict-counts
          path: target/kpi/verdict-counts.json
          # Retention chosen for KPI 4 reporting: long enough to span a
          # quarterly review window but bounded to keep storage usage
          # predictable.
          retention-days: 90

  # =====================================================================
  # Gate 2 — `cargo public-api`
  # Requires nightly. Pinned via $NIGHTLY_PIN for reproducibility.
  # =====================================================================
  gate-2-public-api:
    name: Gate 2 — cargo public-api (public surface lock)
    runs-on: ubuntu-latest
    needs: gate-1-test
    env:
      # Override the workspace's 1.85 stable pin (rust-toolchain.toml)
      # for this gate only. cargo-public-api's transitive deps require
      # rustc 1.86–1.88 to build, and the tool itself uses nightly
      # rustdoc JSON. We already install $NIGHTLY_PIN below, so use
      # that toolchain for everything in this job. The MSRV pin
      # remains authoritative for Gate 1 (cargo test) and Gate 5
      # (cargo mutants), which validate against it.
      # Must match the workflow-level NIGHTLY_PIN. Hard-coded because
      # GitHub Actions does not reliably evaluate ${{ env.NIGHTLY_PIN }}
      # in job-level env (context-availability ordering quirk).
      RUSTUP_TOOLCHAIN: nightly-2026-04-15
    steps:
      - name: Check out repository (with main branch for diff baseline)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history so `--diff-git-checkouts main HEAD` works

      - name: Install pinned nightly Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1 (was @master)
        with:
          toolchain: ${{ env.NIGHTLY_PIN }}
          components: rustc-dev,llvm-tools-preview

      - name: Cache Cargo registry, git index and target/ (nightly)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-

      - name: Install cargo-public-api (precompiled binary)
        # Avoids compiling cargo-public-api from source under our
        # pinned toolchain. cargo-public-api's transitive deps now
        # require rustc 1.86–1.88, which would force the project's
        # MSRV upward for tooling reasons rather than for our own
        # code's needs.
        uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090 # v2.76.0
        with:
          tool: cargo-public-api

      - name: cargo public-api --diff-git-checkouts main HEAD
        # On the first commit (no `main` baseline yet) the diff is
        # empty and the gate is a no-op. After the first merge to
        # `main`, this enforces ADR-0005's surface-lock contract.
        # Newer cargo-public-api drops `--toolchain`; toolchain
        # selection is via RUSTUP_TOOLCHAIN at job level instead.
        #
        # APERTURE GRADUATION: at Aperture DELIVER close, add `-p
        # aperture` to both branches below. Aperture's library
        # surface is `aperture::testing` only (DESIGN ADR-0007 +
        # DISTILL D2); binary surface is empty. See
        # `docs/feature/aperture/devops/wave-decisions.md > A2` and
        # `docs/feature/aperture/devops/ci-cd-pipeline.md > Schedule`.
        run: |
          if git rev-parse --verify origin/main >/dev/null 2>&1 && \
             [ "$(git rev-parse origin/main)" != "$(git rev-parse HEAD)" ]; then
            cargo public-api \
              --diff-git-checkouts origin/main HEAD \
              -p otlp-conformance-harness \
              --deny=added --deny=changed --deny=removed
          else
            echo "No origin/main baseline (or HEAD is origin/main); printing current API only."
            cargo public-api -p otlp-conformance-harness
          fi

  # =====================================================================
  # Gate 3 — `cargo semver-checks`
  # Requires nightly. Pinned via $NIGHTLY_PIN for reproducibility.
  # =====================================================================
  gate-3-semver:
    name: Gate 3 — cargo semver-checks (SemVer compliance)
    runs-on: ubuntu-latest
    needs: gate-1-test
    env:
      # Same rationale as Gate 2: cargo-semver-checks at runtime
      # demands rustc >= 1.91 for rustdoc-JSON generation. Use the
      # already-installed $NIGHTLY_PIN for the entire job and leave
      # the workspace MSRV pin for Gates 1 and 5.
      # Must match the workflow-level NIGHTLY_PIN. Hard-coded because
      # GitHub Actions does not reliably evaluate ${{ env.NIGHTLY_PIN }}
      # in job-level env (context-availability ordering quirk).
      RUSTUP_TOOLCHAIN: nightly-2026-04-15
    steps:
      - name: Check out repository (with main branch for baseline)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install pinned nightly Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1 (was @master)
        with:
          toolchain: ${{ env.NIGHTLY_PIN }}

      - name: Cache Cargo registry, git index and target/ (nightly)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-

      - name: Install cargo-semver-checks (precompiled binary)
        # Same rationale as Gate 2: avoids compiling against our
        # pinned toolchain. The previous obi1kenobi/cargo-semver-checks
        # action wraps `cargo install`, which fails the same way once
        # the tool's deps outpace the project's MSRV.
        uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090 # v2.76.0
        with:
          tool: cargo-semver-checks

      - name: cargo semver-checks
        # cargo-semver-checks defaults to comparing against the
        # crates.io baseline; the harness is unpublished, so that
        # lookup fails. While there is no published baseline, compare
        # against origin/main when it differs from HEAD; on the first
        # commit, skip with a clear note. Once the first release is
        # published, switch to the default registry-baseline behaviour.
        #
        # APERTURE GRADUATION: at Aperture DELIVER close, add
        # `--package aperture` to the cargo-semver-checks invocation
        # below. Same rationale as Gate 2 (Aperture's library surface
        # is `aperture::testing` only). See
        # `docs/feature/aperture/devops/wave-decisions.md > A2`.
        run: |
          if git rev-parse --verify origin/main >/dev/null 2>&1 && \
             [ "$(git rev-parse origin/main)" != "$(git rev-parse HEAD)" ]; then
            cargo semver-checks \
              --package otlp-conformance-harness \
              --baseline-rev origin/main
          else
            echo "No origin/main baseline (or HEAD is origin/main); skipping semver diff."
          fi

  # =====================================================================
  # Gate 5 — `cargo mutants`
  # Slowest gate. Runs only after Gates 1–4 are green.
  #
  # Budget rule (Crafty's Q4): start with the full per-push run.
  # Threshold for switching to `--in-diff origin/main`: 60 seconds
  # wall-clock for any single feature's run. The threshold and the
  # switch-over rule live in ci-cd-pipeline.md; this job carries an
  # explicit `timeout-minutes` upper bound as a safety net.
  #
  # APERTURE GRADUATION: today this gate is scoped to `--package
  # otlp-conformance-harness` because Aperture's tests are RED at
  # DISTILL completion (per `docs/feature/aperture/distill/wave-
  # decisions.md > D7`). Mutation testing requires a green test
  # suite to have anything meaningful to detect.
  #
  # When the Aperture DELIVER cycle closes, DELIVER's final commit
  # changes the invocation below to `cargo mutants --package
  # otlp-conformance-harness --package aperture --no-shuffle --jobs 2`.
  # cargo-mutants supports multiple --package flags natively; per-
  # feature 100 %-kill-rate gate per root `CLAUDE.md`. See
  # `docs/feature/aperture/devops/wave-decisions.md > A4`.
  # =====================================================================
  gate-5-mutants:
    name: Gate 5 — cargo mutants (100% kill rate)
    runs-on: ubuntu-latest
    needs:
      - gate-2-public-api
      - gate-3-semver
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install stable Rust toolchain
        # rust-toolchain.toml takes effect when cargo runs in the
        # workspace; this step's input pins the action's bootstrap.
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1 (was @stable)
        with:
          toolchain: stable

      - name: Cache Cargo registry, git index and target/
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-mutants-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-mutants-
            ${{ runner.os }}-cargo-stable-

      - name: Install cargo-mutants (precompiled binary)
        # Same rationale as Gates 2 and 3.
        uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090 # v2.76.0
        with:
          tool: cargo-mutants

      - name: cargo mutants (full)
        # Per ADR-0005 Gate 5, threshold is 100% caught for v0.
        # `--no-shuffle` for deterministic ordering in CI logs.
        # `--jobs` matched to 2 ubuntu-latest cores; tune if the runner
        # changes.
        #
        # Aperture is included as of the v0 DELIVER close (2026-05-05);
        # both crates' test suites achieved 100% kill rate on touched
        # files at slice-close time. Pre-existing scaffolding misses on
        # `aperture::run` exit-code paths are deliberately accepted
        # behind the deferred SIGTERM equivalence test (Slice 08
        # completion summary).
        run: |
          cargo mutants \
            --package otlp-conformance-harness \
            --package aperture \
            --no-shuffle \
            --jobs 2

      - name: Upload mutants.out artefact
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-out
          path: mutants.out/
          retention-days: 30

  # =====================================================================
  # FUTURE Aperture-specific gates (NOT wired at this DEVOPS-wave close)
  #
  # Per `docs/feature/aperture/devops/wave-decisions.md > A5` and
  # `docs/feature/aperture/devops/ci-cd-pipeline.md > Three new
  # Aperture-specific gates`, the three Aperture-specific CI gates
  # named in DESIGN (`single_validator_per_signal`,
  # `no_telemetry_on_telemetry`, `probe_gold_runner`) are wired into
  # this workflow by their respective DELIVER slices, NOT by the
  # DEVOPS wave. The schedule:
  #
  #   gate-6-aperture-architectural-rules
  #     - Wired by Slice 03 (traces) commit, when the third validator
  #       call site lands and the xtask binary becomes worth
  #       counting.
  #     - Invocation: `cargo run -p xtask --release -- check-architecture-rules`
  #     - Runs xtask AST walks for: single-validator-per-signal,
  #       hexagonal layer dependency direction, no `prost::Message::decode`
  #       in `crates/aperture/src/`, etc. (see DESIGN D10's table).
  #     - Linux + macOS runners both work; pure cargo / Rust.
  #
  #   gate-7-aperture-no-telemetry
  #     - Wired by Slice 06 (forwarding sink) commit, when
  #       ForwardingSink lands and the test has a real allowed-
  #       outbound traffic path to assert.
  #     - Invocation: `cargo test -p aperture --test no_telemetry_on_telemetry --locked`
  #     - The integration test is `#[cfg(target_os = "linux")]`; on
  #       macOS it compiles to `eprintln!("skip: net-ns is Linux-
  #       only")`. CI's ubuntu-latest is the load-bearing runner.
  #
  #   gate-8-aperture-probe-gold
  #     - Wired by Slice 06 commit, when `Probe` and
  #       `wire_then_probe_then_use` land.
  #     - Invocation: `cargo test -p aperture --test probe_gold_runner --locked`
  #     - Uses `wiremock` (in dev-dependencies per DISTILL) for the
  #       fixture downstream that lies. Pure cargo / Rust.
  #
  # No new third-party actions are needed. No new toolchain
  # requirements. Each gate uses the existing stable Rust 1.85
  # toolchain and the existing cargo-stable cache namespace.
  #
  # Sketch job shapes (DELIVER pastes-and-fills at the slice that
  # delivers the underlying artefact):
  #
  #   gate-6-aperture-architectural-rules:
  #     name: Gate 6 — Aperture architectural rules (xtask AST walks)
  #     runs-on: ubuntu-latest
  #     needs: gate-1-test
  #     steps:
  #       - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  #       - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
  #         with:
  #           toolchain: stable
  #       - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
  #         with:
  #           path: |
  #             ~/.cargo/registry
  #             ~/.cargo/git
  #             target
  #           key: ${{ runner.os }}-cargo-stable-${{ hashFiles('**/Cargo.lock') }}
  #           restore-keys: |
  #             ${{ runner.os }}-cargo-stable-
  #       - name: cargo run -p xtask -- check-architecture-rules
  #         run: cargo run -p xtask --release -- check-architecture-rules
  #
  #   (gate-7 and gate-8 follow the same shape with a final
  #   `cargo test -p aperture --test <test-name> --locked` step.)
  # =====================================================================
