# Prometheus configuration for Prism v0's local fixture container.
# Per environments.yaml > external_fixtures > prometheus_container.
# Mounted into the container at /etc/prometheus/prometheus.yml.

global:
  scrape_interval: 1s
  evaluation_interval: 5s

# Self-scrape so /api/v1/query_range against `up` returns a real
# series. Slice 01's walking-skeleton fixture relies on this metric
# being present.
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
