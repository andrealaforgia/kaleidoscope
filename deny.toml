# `cargo deny` configuration for the Kaleidoscope workspace.
#
# Owns Gate 4 of ADR-0005's CI contract:
#   - Licence policy: only OSI-approved permissive licences in the
#     dependency tree (no BSL / SSPL / FSL / RSAL).
#   - Pin policy: opentelemetry-proto must be pinned exactly per ADR-0003.
#   - Yanked-versions ban.
#   - Vulnerability database (RustSec) check.
#
# Recommended excerpt is from ADR-0005, with the additions noted in
# DELIVER's wave-decisions.md (Q4): a `multiple-versions = "allow"`
# relaxation because the opentelemetry-proto feature gates pull in the
# SDK transitively (Q1), which produces a few duplicated transitive
# crates that are not under the harness's control.

[graph]
# Scope the dependency-graph walk to platforms we ship for. Without
# this, cargo-deny walks every target in the lockfile, including
# `wasm32-wasip3` whose tail (wasip3 -> wit-bindgen 0.51 ->
# wit-bindgen-core 0.51) requires Cargo's edition2024 feature. Our
# pinned MSRV (1.78) cannot parse those manifests and the gate fails
# before any policy is checked.
#
# The harness has no platform-specific code; these four triples cover
# Linux servers, ARM Linux, and both Mac architectures. WSL is covered
# by x86_64-unknown-linux-gnu (it runs the Linux binary). Add Windows
# native (x86_64-pc-windows-msvc) when a real consumer needs it.
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "aarch64-unknown-linux-gnu" },
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
]
all-features = false
no-default-features = false

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "CC0-1.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  # webpki-roots ships the Mozilla CA list under CDLA-Permissive-2.0
  # (the data, not the code). The Community Data License Agreement
  # Permissive 2.0 is OSI-aware and permissive (no copyleft, no
  # patent retaliation, attribution-only). Pulled in via reqwest's
  # rustls flavour by Aperture's ForwardingSink (Slice 06).
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
# A duplicate-version policy of "deny" is the long-term goal; for v0 we
# allow duplicates because opentelemetry-proto's feature schema (Q1)
# transitively brings in the OpenTelemetry SDK, which independently
# pins some lower-level crates and creates duplicates with the
# harness's direct prost dependency. Revisit when upstream issue
# proposed in DELIVER wave-decisions.md is resolved.
multiple-versions = "allow"
wildcards = "deny"
deny = [
  { name = "openssl", reason = "use rustls" },
]
skip = []
skip-tree = []

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
