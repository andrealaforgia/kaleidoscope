# Kaleidoscope — one-command local experiment stack (ADR-0077).
#
# ONE consolidated-runtime container + ONE shared named volume. The
# runtime serves OTLP ingest (gRPC 4317 / HTTP 4318), the three query
# routers (metrics 9090 / logs 9091 / traces 9092), AND Prism
# same-origin from the metrics router on 9090 (KALEIDOSCOPE_QUERY_STATIC_DIR
# baked into the image, ADR-0077 F4). No separate Prism service, no CORS.
#
# The runtime is the SOLE WRITER of the pillar stores (pulse/lumen/ray)
# under the shared volume (C1/W7, ADR-0076 DD4): there is intentionally
# no second store-writing service here. The optional `seed` service
# pushes telemetry over the wire (it is an OTLP client, not a store
# writer) and only touches a once-only marker file on the volume.
#
# Local posture (DISCUSS W3): single tenant `acme`, auth OFF, no TLS.
# Prefer the Makefile (`make up` / `make down` / `make demo` /
# `make seed` / `make logs` / `make clean`) over raw compose.

services:
  # The consolidated runtime + same-origin Prism. Default `docker compose
  # up` starts only this service (seed is profile-gated).
  runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
      target: runtime
    image: kaleidoscope-runtime:local
    environment:
      # One tenant drives ingest + all three query routers. Override with
      # KALEIDOSCOPE_TENANT in the environment; defaults to acme.
      KALEIDOSCOPE_TENANT: ${KALEIDOSCOPE_TENANT:-acme}
      # Pillar root and the Prism static dir are baked into the image
      # (KALEIDOSCOPE_PILLAR_ROOT=/data, KALEIDOSCOPE_QUERY_STATIC_DIR=
      # /srv/prism); auth is OFF by local default (no auth env set).
    ports:
      - "4317:4317" # OTLP ingest gRPC
      - "4318:4318" # OTLP ingest HTTP/protobuf
      - "9090:9090" # metrics query + Prism (same-origin)
      - "9091:9091" # logs query
      - "9092:9092" # traces query
    volumes:
      - kaleidoscope-data:/data
    healthcheck:
      # The runtime binds 9090 only after the fail-closed startup probes
      # pass and all five listeners are bound (ADR-0076 DD3), so a TCP
      # connect to 9090 is a sound readiness signal. Uses bash /dev/tcp
      # (bash is in the base image) to avoid adding curl/wget. The
      # Makefile additionally polls the HTTP query endpoint from the host.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9090"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 5s

  # One-shot telemetry seed / demo (ADR-0077 F3). Profile-gated so a
  # plain `make up` never builds or runs it. It builds the DELIVER-owned
  # `kaleidoscope-telemetrygen` (Dockerfile.runtime `generator` target);
  # until that crate lands on main the build fails fast with a clear
  # cargo error and ONLY `make seed` / `make demo` touch it (wired-ahead).
  #
  #   make seed  -> marker-gated once-only (skips if /data/.seeded exists)
  #   make demo  -> SEED_FORCE=1, pushes regardless of the marker
  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: Dockerfile.runtime
      target: generator
    image: kaleidoscope-telemetrygen:local
    depends_on:
      runtime:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://runtime:4317
      KALEIDOSCOPE_TENANT: ${KALEIDOSCOPE_TENANT:-acme}
      SEED_FORCE: ${SEED_FORCE:-0}
    volumes:
      - kaleidoscope-data:/data
    # Marker-gate the once-only seed (US-05). The generator pushes over
    # the wire; the marker (/data/.seeded) records that the first-look
    # sample has been seeded so a restart does not re-seed (US-05 AC3).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "$${SEED_FORCE}" = "1" ] || [ ! -f /data/.seeded ]; then
          kaleidoscope-telemetrygen \
            && touch /data/.seeded \
            && echo "seed: pushed sample telemetry for tenant $${KALEIDOSCOPE_TENANT}";
        else
          echo "seed: /data/.seeded present, skipping (use 'make demo' to force a re-push)";
        fi

volumes:
  # Durable telemetry survives `make down`; `make clean` removes it.
  kaleidoscope-data:
