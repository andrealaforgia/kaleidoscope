# Kaleidoscope — one-command local experiment stack (ADR-0077 / ADR-0079).
#
# ONE consolidated-runtime container + ONE shared named volume. The
# runtime serves OTLP ingest (gRPC 4317 / HTTP 4318), the three query
# routers (metrics 9090 / logs 9091 / traces 9092), AND Prism
# same-origin from the metrics router on 9090 (KALEIDOSCOPE_QUERY_STATIC_DIR
# baked into the image, ADR-0077 F4). No separate Prism service, no CORS.
#
# ALWAYS-CURRENT DEMO (ADR-0079): the runtime's READ side is wrapped with
# the demo overlay, which SYNTHESISES the demo telemetry at query time
# (now-relative, store-free) for the demo service identity
# `kaleidoscope-demo`. So a plain `docker compose up` / `make up` shows a
# non-empty, always-current first look through the overlay with NO seed
# step — the demo is never SEEDED into the store (seeding the bundled demo
# would DOUBLE it against the overlay for the demo service). The demo has
# no write path, so the Customer's real ingested data and durability are
# untouched.
#
# The runtime is the SOLE WRITER of the pillar stores (pulse/lumen/ray)
# under the shared volume (C1/W7, ADR-0076 DD4): there is intentionally
# no second store-writing service here. The optional `seed` service is now
# the MANUAL real-pipeline dogfood: it pushes REAL telemetry over the wire
# (it is an OTLP client, not a store writer) that COEXISTS with the
# always-present synthetic demo; it only touches a once-only marker file on
# the volume.
#
# Local posture (DISCUSS W3): single tenant `acme`, auth OFF, no TLS.
# Prefer the Makefile (`make up` / `make down` / `make demo` /
# `make seed` / `make logs` / `make clean`) over raw compose.

services:
  # The consolidated runtime + same-origin Prism. Default `docker compose
  # up` starts only this service (seed is profile-gated).
  runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
      target: runtime
    image: kaleidoscope-runtime:local
    # Auto-recovery for the managed "always-current" instance: the runtime
    # must stay reachable or come back on its own after a crash, an
    # unexpected exit, or a Docker daemon / host restart, with NO operator
    # or Customer action. `unless-stopped` restarts the container on any
    # such exit while honouring a deliberate `docker stop` / `make down`
    # (intentional operator teardown). The one-shot `seed` service is
    # intentionally left without a restart policy (it runs once and exits).
    restart: unless-stopped
    environment:
      # One tenant drives ingest + all three query routers. Override with
      # KALEIDOSCOPE_TENANT in the environment; defaults to acme.
      KALEIDOSCOPE_TENANT: ${KALEIDOSCOPE_TENANT:-acme}
      # Pillar root and the Prism static dir are baked into the image
      # (KALEIDOSCOPE_PILLAR_ROOT=/data, KALEIDOSCOPE_QUERY_STATIC_DIR=
      # /srv/prism); auth is OFF by local default (no auth env set).
    ports:
      - "4317:4317" # OTLP ingest gRPC
      - "4318:4318" # OTLP ingest HTTP/protobuf
      - "9090:9090" # metrics query + Prism (same-origin)
      - "9091:9091" # logs query
      - "9092:9092" # traces query
    volumes:
      - kaleidoscope-data:/data
    healthcheck:
      # The runtime binds 9090 only after the fail-closed startup probes
      # pass and all five listeners are bound (ADR-0076 DD3), so a TCP
      # connect to 9090 is a sound readiness signal. Uses bash /dev/tcp
      # (bash is in the base image) to avoid adding curl/wget. The
      # Makefile additionally polls the HTTP query endpoint from the host.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9090"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 5s

  # One-shot REAL-pipeline dogfood (ADR-0077 F3 / ADR-0079). Profile-gated
  # so a plain `make up` never builds or runs it — the first look is already
  # non-empty via the always-current demo OVERLAY (read-side, no seed). This
  # service is the MANUAL way to exercise the REAL ingest pipeline: it builds
  # `kaleidoscope-telemetrygen` (Dockerfile.runtime `generator` target) and
  # pushes a REAL OTLP sample. That real data is filed under the demo service
  # name and COEXISTS with the synthetic demo (which the overlay always
  # synthesises) — the two sit side by side; the synthetic demo is always
  # present whether or not this has ever run.
  #
  #   make seed  -> marker-gated once-only (skips if /data/.seeded exists)
  #   make demo  -> SEED_FORCE=1, pushes a real OTLP sample regardless of the marker
  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: Dockerfile.runtime
      target: generator
    image: kaleidoscope-telemetrygen:local
    depends_on:
      runtime:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://runtime:4317
      KALEIDOSCOPE_TENANT: ${KALEIDOSCOPE_TENANT:-acme}
      SEED_FORCE: ${SEED_FORCE:-0}
    volumes:
      - kaleidoscope-data:/data
    # Marker-gate the once-only real-sample push (US-05). The first look is
    # provided by the always-current overlay (ADR-0079), NOT by this push;
    # the generator pushes a REAL OTLP sample over the wire and the marker
    # (/data/.seeded) records that it has run so a restart does not re-push
    # (US-05 AC3). `make demo` forces a re-push regardless of the marker.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "$${SEED_FORCE}" = "1" ] || [ ! -f /data/.seeded ]; then
          kaleidoscope-telemetrygen \
            && touch /data/.seeded \
            && echo "seed: pushed sample telemetry for tenant $${KALEIDOSCOPE_TENANT}";
        else
          echo "seed: /data/.seeded present, skipping (use 'make demo' to force a re-push)";
        fi

volumes:
  # Durable telemetry survives `make down`; `make clean` removes it.
  kaleidoscope-data:
