[package]
name = "beacon"
version = "0.1.0"
edition.workspace = true
# AGPL-3.0-or-later because Beacon is a platform-class alerting engine,
# symmetric with Aperture, Sieve, and Codex. See `LICENSING.md` for the
# rationale and the per-crate table.
license = "AGPL-3.0-or-later"
rust-version.workspace = true
description = "Beacon — Kaleidoscope's CUE-defined rule-evaluation engine. Reads from any OTel-compatible PromQL backend, evaluates alert rules and SLO burn-rate rules per Google's SRE workbook methodology, emits incidents to webhook / SMTP / Mattermost / Zulip / Grafana OnCall."
repository = "https://github.com/andrealaforgia/kaleidoscope"
publish = false

[lib]
path = "src/lib.rs"

# ----------------------------------------------------------------------
# DISTILL placeholder. Per `docs/feature/beacon-v0/devops/wave-decisions.md`:
# this is the workspace-membership commit; the acceptance test files and
# the full public API stubs land in a follow-up DISTILL commit alongside
# the CI workflow exclude rules.
# ----------------------------------------------------------------------

[dependencies]
# Runtime closure is currently empty. ADR-0033 names the deps that will
# land at slice 01 DELIVER: tokio (async runtime is owned by the binary,
# not the library), reqwest (the binary's HTTP client; not in the library
# public API per ADR-0033), serde / serde_json (canonical Incident
# serialisation), async-trait (Sink trait).
#
# The skeleton crate compiles with zero deps; the public surface is empty
# until DISTILL adds the type stubs.

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
